<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anish | Web Developer</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="hero">

    <img
        src="https://d1fdloi71mui9q.cloudfront.net/aU6ZglaTSHiNRBZQikv1_QojXcYBgPAvr1seQ"
        alt="Profile picture of the developer"
        class="profile-image"
    >

    <h1>Hi, I'm Anish 👋</h1>

    <p class="subtitle">
        Web Developer • Programmer • Movie Producer
    </p>

</header>

<section class="clock-section">

    <h2>Current Time</h2>

    <p>Click the button below to display the current time.</p>

    <button onclick="showTime()" class="btn">
        Show Time
    </button>

    <p id="timeOutput"></p>

</section>

<section class="about">

    <h2>About Me</h2>

    <p>
        Welcome to my personal website. I enjoy building websites,
        coding projects, and creating films.
    </p>

</section>

<section class="signin-container">

    <form action="movie.html">

        <h2>Sign In</h2>

        <label for="name">Full Name</label>
        <input
            id="name"
            type="text"
            placeholder="Enter Your Full Name"
            required
        >

        <label for="email">Email Address</label>
        <input
            id="email"
            type="email"
            placeholder="Enter Your Email"
            required
        >

        <label for="password">Password</label>
        <input
            id="password"
            type="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit" class="btn">
            Submit
        </button>

    </form>

</section>

<nav class="pagination">

    <a href="index.html" class="active">Home</a>

    <a href="read.html">Read More</a>

</nav>

<footer>

    <p>
        © 2026 Anish. All Rights Reserved.
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>

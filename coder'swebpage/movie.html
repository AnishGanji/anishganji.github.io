<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Movie</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Roboto',sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            min-height:100vh;
            color:white;
        }

        header{
            text-align:center;
            padding:30px 20px;
        }

        header h1{
            font-size:3rem;
            font-weight:700;
            text-shadow:0 0 20px rgba(255,255,255,.3);
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .video-card{
            width:100%;
            max-width:1000px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(12px);
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        video{
            width:100%;
            border-radius:15px;
            outline:none;
        }

        .movie-info{
            margin-top:20px;
            text-align:center;
        }

        .movie-info h2{
            margin-bottom:10px;
        }

        .movie-info p{
            color:#e5e7eb;
            line-height:1.6;
        }

        .btn-home{
            display:inline-block;
            margin-top:20px;
            padding:12px 24px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:10px;
            transition:0.3s;
        }

        .btn-home:hover{
            background:#60a5fa;
            transform:translateY(-2px);
        }

        footer{
            text-align:center;
            padding:20px;
            margin-top:30px;
            color:#dbeafe;
        }

        @media(max-width:768px){
            header h1{
                font-size:2rem;
            }

            .video-card{
                padding:15px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>🎬 Watch Movie</h1>
    </header>

    <div class="container">

        <div class="video-card">

            <video id="moviePlayer" controls>
                <source src="/videofolder/Subscribe Intro.mp4" type="video/mp4">
                Your browser does not support HTML5 video.
            </video>

            <div class="movie-info">
                <h2>Featured Video</h2>

                <p>
                    Sit back, relax, and enjoy the viewing experience.
                    This player is responsive and works on desktop,
                    tablet, and mobile devices.
                </p>

                <a href="index.html" class="btn-home">
                    Back to Home
                </a>
            </div>

        </div>

    </div>

    <footer>
        © 2026 Watch Movie. All Rights Reserved.
    </footer>

    <script>
        const player = document.getElementById("moviePlayer");

        player.addEventListener("loadedmetadata", () => {
            console.log("Video Loaded");
        });

        player.addEventListener("ended", () => {
            alert("Thanks for watching!");
        });
    </script>

</body>
</html>
